<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV — Melissa Jo Carson</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111111;
      --border: #2e2e2e;
      --muted: #888880;
      --accent: #e07060;
      --name: #ffffff;
      --serif: 'EB Garamond', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
      --max: 860px;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--name); }
    nav { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 1px solid var(--border); }
    .nav-inner { max-width: var(--max); margin: 0 auto; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .nav-name { font-family: var(--serif); font-size: 1.1rem; font-weight: 500; color: var(--name); text-decoration: none; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-size: 0.82rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--name); }
    .nav-links a.active { color: var(--name); border-bottom: 1px solid var(--name); }
    main { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 56px); gap: 1rem; }
    .cv-label { font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .download-btn { display: inline-block; font-size: 0.9rem; font-weight: 500; letter-spacing: 0.04em; color: var(--name); border: 1px solid var(--border); padding: 0.75rem 2rem; border-radius: 3px; text-decoration: none; transition: border-color 0.2s, color 0.2s; }
    .download-btn:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a class="nav-name" href="index.html">Melissa Jo Carson</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="research.html">Research</a></li>
        <li><a href="cv.html" class="active">CV</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <p class="cv-label">Curriculum Vitae</p>
    <a class="download-btn" href="cv.pdf" download>Download CV (PDF)</a>
  </main>
</body>
</html>
